<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>week03,POSSE課題｜みんなのプロフィール</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-100 min-h-screen">

    <!-- タイトル -->
    <header class="pt-10">
    <h1
        class="bg-pink-200 text-red-500 text-5xl font-bold text-center rounded-2xl w-11/12 mx-auto py-3">
        ⭐みんなのプロフィール（POSSE生）
    </h1>
    </header>

    <!-- カード全体 -->
    <main class="flex justify-center gap-8 mt-32 px-8">

    <!-- カード1 -->
    <div class="bg-yellow-300 w-96 rounded-3xl p-5 shadow-md">

        <h2 class="text-5xl">🍵MN</h2>

        <img src="images/ore.jpg"
        class="w-32 h-32 rounded-full object-cover mx-auto mt-3">

        <h3 class="text-3xl font-bold mt-8">
        松浦直生
        </h3>

        <p class="text-gray-500 text-2xl mt-2">
        通称：まっちゃん
        </p>

        <p class="mt-5 text-xl font-semibold leading-relaxed">
        最近、自炊日記のいいねが増えて調子に乗っている痛いヤツ
        </p>
    </div>

    <!-- カード2 -->
    <div class="bg-yellow-300 w-96 rounded-3xl p-5 shadow-md">

        <h2 class="text-5xl">📕DR</h2>

        <img src="images/dio.jpg"
        class="w-32 h-32 rounded-full object-cover mx-auto mt-3">

        <h3 class="text-3xl font-bold mt-8">
        土井陸渡
        </h3>

        <p class="text-gray-500 text-2xl mt-2">
        通称：DIO
        </p>

        <p class="mt-5 text-xl font-semibold leading-relaxed">
        可愛い一面のあるグラな先輩。もっとたくさん話したいです。
        </p>
    </div>

    <!-- カード3 -->
    <div class="bg-yellow-300 w-96 rounded-3xl p-5 shadow-md">

        <h2 class="text-5xl">⚽️MT</h2>

        <img src="images/mashimo.jpg"
        class="w-32 h-32 rounded-full object-cover mx-auto mt-3">

        <h3 class="text-3xl font-bold mt-8">
        真下知大
        </h3>

        <p class="text-gray-500 text-2xl mt-2">
        通称：マッシーモ
        </p>

        <p class="mt-5 text-xl font-semibold leading-relaxed">
        ジュビロを愛する面白い男。横モクよろしく！！
        </p>
    </div>

    <!-- カード4 -->
    <div class="bg-yellow-300 w-96 rounded-3xl p-5 shadow-md">

        <h2 class="text-5xl">🍳KS</h2>

        <img src="images/paypay.jpg"
        class="w-32 h-32 rounded-full object-cover mx-auto mt-3">

        <h3 class="text-3xl font-bold mt-8">
        小暮真平
        </h3>

        <p class="text-gray-500 text-2xl mt-2">
        通称：ペイペイ
        </p>

        <p class="mt-5 text-xl font-semibold leading-relaxed">
        料理もプログラミングも完璧なイケメン（いつも頼りにしてます）
        </p>
    </div>

    </main>

</body>

</html>
