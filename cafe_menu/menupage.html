<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カフェページ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-brawn-300">
<div>
<h1 class="font-bold text-4xl bg-red-600 text-center p-3 text-yellow-400">
まっちゃんカフェ
</h1>    
</div>
<div>
<h2 class="font-bold text-2xl text-center bg-green-500">
＜GRAND MENU＞
</h2>
<section class="p-10">

    <h2 class="font-bold p-5">
        DRINK
    </h2>

    <div class="flex items-start gap-10">

        <!-- メニュー -->
        <ul class=" leading-loose">
            <li>・コーヒー（HOT/ICE）</li>
            <li>・カフェラテ（HOT/ICE）</li>
            <li>・紅茶（HOT/ICE）</li>
        </ul>

        <!-- 写真 -->
        <img
            src="kocha.jpg"
            class="w-48 rounded-lg hover:scale-105 duration-300"
        >

    </div>

</section>
<section class="p-10">

    <h2 class="font-bold p-5">
        FOOD
    </h2>

    <div class="flex items-start gap-10">

        <!-- メニュー -->
        <ul class=" leading-loose">
            <li>・サンドイッチ</li>
            <li>・ナポリタン</li>
            <li>・まっちゃん特製カレー</li>
        </ul>

        <!-- 写真 -->
        <img
            src="curry.jpg"
            class="w-48 rounded-lg hover:scale-105 duration-300"
        >

    </div>

</section>
<section class="p-10">

    <h2 class="font-bold p-5">
        DESSERT
    </h2>

    <div class="flex items-start gap-10">

        <!-- メニュー -->
        <ul class=" leading-loose">
            <li>・プリン</li>
            <li>・モンブラン</li>
            <li>・チーズケーキ</li>
            <li>・アイスクリーム</li>
        </ul>

        <!-- 写真 -->
        <img
            src="purin.jpg"
            class="w-48 rounded-lg hover:scale-105 duration-300"
        >

    </div>
</section>
</body>
</html>
