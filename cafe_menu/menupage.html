<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カフェページ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-yellow-100">

まっちゃんカフェ

</div>

＜GRAND MENU＞

    <h2 class="font-bold p-5">
        DRINK

    <div class="flex items-start gap-10">

        <!-- メニュー -->
        <ul class=" leading-loose">
            <li>・コーヒー（HOT/ICE）  ¥200</li>

        <img
            src="kocha.jpg"
            class="w-48 rounded-lg hover:scale-105 duration-300"
        >

    </div>

</section>
<section class="p-10">

    <h2 class="font-bold p-5">
        FOOD

    <div class="flex items-start gap-10">

        <!-- メニュー -->

            <li>・サンドイッチ  ¥350</li>

            src="curry.jpg"

    </div>

</section>
<section class="p-10">

    <h2 class="font-bold p-5">
        DESSERT
    </h2>

    <div class="flex items-start gap-10">

        <!-- メニュー -->
        <ul class=" leading-loose">
            <li>・プリン  ¥300</li>
            <li>・モンブラン  ¥400</li>
            <li>・チーズケーキ  ¥350</li>
            <li>・アイスクリーム  ¥250</li>
        </ul>

        <!-- 写真 -->
        <img
            src="purin.jpg"
            class="w-48 rounded-lg hover:scale-105 duration-300"
        >

    </div>
</section>

</html>
