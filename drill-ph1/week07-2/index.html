<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week07 ミニドリル 問題2｜バグ診断</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-6">

  <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-lg">
    <h1 id="title" class="text-center text-xl font-bold text-slate-800">今日のメッセージ</h1>
    <p id="msg" class="mt-6 text-center text-lg text-slate-700">DOM の取得先を間違えないでね</p>
    <button type="button" id="swapBtn"
      class="mx-auto mt-8 block w-full rounded-lg bg-slate-800 py-3 text-sm font-bold text-white hover:bg-slate-900">
      文言を差し替える
    </button>
  </div>

  <script>
    // バグ: ID なのに # を付けていない（タグ名として解釈され null になる）
    const btn = document.querySelector("swapBtn");

    btn.addEventListener("click", () => {
      const title = document.querySelector("#title");
      const msg = document.querySelector("#msg");
      title.textContent = "DOM イベント OK";
      msg.textContent = "querySelector('#id') を忘れずに！";
    });
  </script>
</body>
</html>
