<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week05-2 md: バグ診断</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">

  <h1 class="text-2xl font-bold text-gray-700 mb-2">Week05-2: md: のバグを直せ</h1>
  <p class="text-gray-500 mb-8">画面を広げても2列にならないのはなぜ？ class をよく見てバグを修正してください。</p>

  <!--
    🐛 バグ: 画面を広げても1列のまま変わらない
    class をよく見て、どこがおかしいか探してみよう
  -->
  <div class="grid grid-cols-1 md: grid-cols-2 gap-4 max-w-2xl">

    <div class="bg-blue-100 rounded-xl p-6 shadow">
      <h2 class="font-bold text-blue-800 mb-1">❌ カード 1</h2>
      <p class="text-blue-700 text-sm">画面を広げても2列になりません。</p>
    </div>

    <div class="bg-green-100 rounded-xl p-6 shadow">
      <h2 class="font-bold text-green-800 mb-1">❌ カード 2</h2>
      <p class="text-green-700 text-sm">md: の後のスペースが原因です。</p>
    </div>

    <div class="bg-yellow-100 rounded-xl p-6 shadow">
      <h2 class="font-bold text-yellow-800 mb-1">❌ カード 3</h2>
      <p class="text-yellow-700 text-sm">Tailwind はスペース入りのクラスを認識しません。</p>
    </div>

    <div class="bg-purple-100 rounded-xl p-6 shadow">
      <h2 class="font-bold text-purple-800 mb-1">❌ カード 4</h2>
      <p class="text-purple-700 text-sm">正しいクラス名に直してください。</p>
    </div>

  </div>

  <!--
    TODO: 上の div の class を修正して、
    goal.png と同じ見た目のように md（768px以上）で2列になるようにしてください。
    ヒント: md: grid-cols-2 → md:grid-cols-2
  -->

</body>
</html>
