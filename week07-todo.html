<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODOリスト</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen p-4 bg-[url('./images/profile2.jpg')]">
    <div class="bg-yellow-300 rounded-lg shadow p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-green-700">TODOリスト</h1>
        <div class="flex gap-2 mb-6">
            <input id="todoInput" type="text" placeholder="タスクを入力..."class="flex-1 border border-gray-300 rounded px-3 py-2">
            <button id="addBtn"class="bg-blue-600 text-white font-bold px-4 py-2 rounded hover:bg-orange-500 transition">追加</button>
        </div>
        <ul id="todoList" class="space-y-2"></ul>
        <div class="flex items-center justify-center w-24 ml-36 mt-4">
        <button id="clearBtn" class="text-red-500 bg-green-700 rounded-lg m-2 hover:bg-white p-2">全削除</button>
        </div>
    </div>
    <script>
        const title = document.querySelector("#page-title");
        const card = document.querySelector(".card");
        const firstParagraph = document.querySelector("p");
        const addButton = document.querySelector("#addBtn");
        const todoInput = document.querySelector("#todoInput");
        const todoList = document.querySelector("#todoList");
        addButton.addEventListener("click", () => {
        const text = todoInput.value;
        // 何も入力されていなければ何もしない
        if (text === "") {
        return;
        }
        // li要素を作る
        const item = document.createElement("li");
        item.className = "flex items-center justify-between bg-gray-50 rounded px-3 py-2";
        // タスクのテキスト部分
        const span = document.createElement("span");
        span.textContent = text;
        // 完了ボタン
        const doneBtn = document.createElement("button");
        doneBtn.textContent = "完了";
        doneBtn.className = "text-sm text-gray-500 hover:text-red-500";
        doneBtn.addEventListener("click", () => {
        span.classList.toggle("line-through");
        span.classList.toggle("text-gray-400");
        });
        item.appendChild(span);
        item.appendChild(doneBtn);
        todoList.appendChild(item);
        // 入力欄をリセット
        todoInput.value = "";
        });
const clearBtn = document.querySelector("#clearBtn");

clearBtn.addEventListener("click", () => {
    if (confirm("すべてのタスクを削除しますか？")) {
    todoList.innerHTML = "";
    }
});
    </script>
</body>
</html>
